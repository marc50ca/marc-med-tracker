# Complete Dashboard Card - Apple Health Integration
# Updated with hae.marchealthsync sensors
# Copy each card separately using the card-by-card method

# ========================================
# CARD 1: Today's Medication Schedule
# ========================================

type: entities
title: "📅 Today's Medications"
state_color: true
entities:
  - entity: input_boolean.marc_med_morning_helper
    name: "☀️ Morning Pills (6 tablets)"
  - entity: input_boolean.marc_med_morning_puffer_helper
    name: "☀️ Morning Puffer"
  - entity: input_boolean.marc_med_lunch_helper
    name: "🌞 Lunch Pills (2 tablets)"
  - entity: input_boolean.marc_med_evening_helper
    name: "🌙 Evening Pills (1 tablet)"
  - entity: input_boolean.marc_med_evening_puffer_helper
    name: "🌙 Evening Puffer"

# ========================================
# CARD 2: Daily Progress
# ========================================

type: markdown
content: |
  {% set taken = [
    states('input_boolean.marc_med_morning_helper'),
    states('input_boolean.marc_med_morning_puffer_helper'),
    states('input_boolean.marc_med_lunch_helper'),
    states('input_boolean.marc_med_evening_helper'),
    states('input_boolean.marc_med_evening_puffer_helper')
  ] | select('eq', 'on') | list | count %}
  {% set percent = (taken / 5 * 100) | round(0) %}
  
  <div style="text-align: center; padding: 25px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 15px; color: white;">
    <h1 style="margin: 0; font-size: 48px;">{{ percent }}%</h1>
    <h3 style="margin: 10px 0;">{{ taken }} of 5 doses completed today</h3>
    {% if percent == 100 %}
    <p style="font-size: 28px;">🎉 Perfect adherence!</p>
    {% elif percent >= 60 %}
    <p style="font-size: 24px;">👍 Keep it up!</p>
    {% else %}
    <p style="font-size: 24px;">⏰ {{ 5 - taken }} more to go</p>
    {% endif %}
  </div>

# ========================================
# CARD 3: Blood Glucose - 3 Daily Readings
# ========================================

type: entities
title: "🩸 Blood Glucose - Today's Readings"
state_color: true
entities:
  - entity: hae.marchealthsync_blood_glucose
    name: "Current Reading"
    icon: mdi:diabetes
  - type: custom:auto-entities
    card:
      type: entities
    filter:
      include:
        - entity_id: hae.marchealthsync_blood_glucose
          options:
            type: custom:multiple-entity-row
            name: "Last 3 Readings"
            state_header: "Latest"
            entities:
              - attribute: history_1
                name: "2nd"
              - attribute: history_2
                name: "3rd"

# ========================================
# CARD 3A: Blood Glucose Averages
# ========================================

type: markdown
content: |
  ## 📊 Blood Glucose Averages
  
  {% set sensor = 'hae.marchealthsync_blood_glucose' %}
  {% set readings_7d = [] %}
  {% set readings_30d = [] %}
  {% set readings_90d = [] %}
  
  {# Get readings from the last 90 days #}
  {% set now_ts = now().timestamp() %}
  {% set day_7 = now_ts - (7 * 86400) %}
  {% set day_30 = now_ts - (30 * 86400) %}
  {% set day_90 = now_ts - (90 * 86400) %}
  
  {# Note: This requires history statistics or similar #}
  {# Simplified version showing current approach #}
  
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0;">
    <div style="padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white; text-align: center;">
      <div style="font-size: 14px; opacity: 0.9;">7-Day Average</div>
      <div style="font-size: 36px; font-weight: bold; margin: 10px 0;">
        {% if states('sensor.blood_glucose_7day_avg') != 'unknown' %}
          {{ states('sensor.blood_glucose_7day_avg') }}
        {% else %}
          --
        {% endif %}
      </div>
      <div style="font-size: 12px; opacity: 0.8;">mg/dL</div>
    </div>
    
    <div style="padding: 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; color: white; text-align: center;">
      <div style="font-size: 14px; opacity: 0.9;">30-Day Average</div>
      <div style="font-size: 36px; font-weight: bold; margin: 10px 0;">
        {% if states('sensor.blood_glucose_30day_avg') != 'unknown' %}
          {{ states('sensor.blood_glucose_30day_avg') }}
        {% else %}
          --
        {% endif %}
      </div>
      <div style="font-size: 12px; opacity: 0.8;">mg/dL</div>
    </div>
    
    <div style="padding: 20px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 12px; color: white; text-align: center;">
      <div style="font-size: 14px; opacity: 0.9;">90-Day Average</div>
      <div style="font-size: 36px; font-weight: bold; margin: 10px 0;">
        {% if states('sensor.blood_glucose_90day_avg') != 'unknown' %}
          {{ states('sensor.blood_glucose_90day_avg') }}
        {% else %}
          --
        {% endif %}
      </div>
      <div style="font-size: 12px; opacity: 0.8;">mg/dL</div>
    </div>
  </div>
  
  <div style="padding: 15px; background: #e3f2fd; border-left: 5px solid #2196F3; border-radius: 8px; margin-top: 20px;">
    <strong>📝 Note:</strong> To enable averages, add the template sensors below to your configuration.yaml
  </div>

