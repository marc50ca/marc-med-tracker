title: 💊 Medication Dashboard
path: medication-hub
icon: mdi:medical-bag
theme: marc_med_tracker
badges: []
cards:
  # ==========================================
  # HEADER SECTION
  # ==========================================
  
  - type: vertical-stack
    cards:
      # Welcome banner with date
      - type: markdown
        content: |
          <ha-alert alert-type="info" title="Medication Management Center">
          Track your medications, manage inventory, and never miss a dose
          </ha-alert>
          
          **Today:** {{ now().strftime('%A, %B %d, %Y') }} at {{ now().strftime('%I:%M %p') }}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              border-radius: 15px;
            }

  # ==========================================
  # TODAY'S DOSES - Interactive Buttons
  # ==========================================
  
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          ## 📅 Today's Medication Schedule
          *Tap to mark as taken • Auto-resets at midnight*
      
      - type: horizontal-stack
        cards:
          # Morning section
          - type: custom:button-card
            entity: binary_sensor.marc_med_morning
            name: Morning Pills
            icon: mdi:weather-sunset-up
            show_state: true
            state:
              - value: 'on'
                color: '#4CAF50'
                icon: mdi:check-circle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
              - value: 'off'
                color: '#f44336'
                icon: mdi:alarm
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
            styles:
              card:
                - height: 120px
                - border-radius: 15px
                - box-shadow: 0 4px 8px rgba(0,0,0,0.2)
              name:
                - font-size: 16px
                - font-weight: bold
              icon:
                - width: 40px
                - height: 40px
            tap_action:
              action: toggle
            hold_action:
              action: more-info
          
          # Lunch section
          - type: custom:button-card
            entity: binary_sensor.marc_med_lunch
            name: Lunch Pills
            icon: mdi:weather-sunny
            show_state: true
            state:
              - value: 'on'
                color: '#4CAF50'
                icon: mdi:check-circle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
              - value: 'off'
                color: '#f44336'
                icon: mdi:alarm
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
            styles:
              card:
                - height: 120px
                - border-radius: 15px
                - box-shadow: 0 4px 8px rgba(0,0,0,0.2)
              name:
                - font-size: 16px
                - font-weight: bold
              icon:
                - width: 40px
                - height: 40px
            tap_action:
              action: toggle
            hold_action:
              action: more-info
          
          # Evening section
          - type: custom:button-card
            entity: binary_sensor.marc_med_evening
            name: Evening Pills
            icon: mdi:weather-sunset-down
            show_state: true
            state:
              - value: 'on'
                color: '#4CAF50'
                icon: mdi:check-circle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
              - value: 'off'
                color: '#f44336'
                icon: mdi:alarm
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)'
                  name:
                    - color: white
                  icon:
                    - color: white
            styles:
              card:
                - height: 120px
                - border-radius: 15px
                - box-shadow: 0 4px 8px rgba(0,0,0,0.2)
              name:
                - font-size: 16px
                - font-weight: bold
              icon:
                - width: 40px
                - height: 40px
            tap_action:
              action: toggle
            hold_action:
              action: more-info
      
      # Puffers row
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            entity: binary_sensor.marc_med_morning_puffer
            name: Morning Puffer
            icon: mdi:spray
            show_state: true
            state:
              - value: 'on'
                color: '#4CAF50'
                icon: mdi:check-circle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)'
              - value: 'off'
                color: '#FF9800'
                icon: mdi:spray-bottle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #FF9800 0%, #F57C00 100%)'
            styles:
              card:
                - height: 100px
                - border-radius: 15px
                - color: white
              name:
                - font-weight: bold
                - color: white
              icon:
                - color: white
            tap_action:
              action: toggle
          
          - type: custom:button-card
            entity: binary_sensor.marc_med_evening_puffer
            name: Evening Puffer
            icon: mdi:spray
            show_state: true
            state:
              - value: 'on'
                color: '#4CAF50'
                icon: mdi:check-circle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)'
              - value: 'off'
                color: '#FF9800'
                icon: mdi:spray-bottle
                styles:
                  card:
                    - background: 'linear-gradient(135deg, #FF9800 0%, #F57C00 100%)'
            styles:
              card:
                - height: 100px
                - border-radius: 15px
                - color: white
              name:
                - font-weight: bold
                - color: white
              icon:
                - color: white
            tap_action:
              action: toggle
      
      # Progress indicator
      - type: markdown
        content: |
          {% set taken = [
            states('binary_sensor.marc_med_morning'),
            states('binary_sensor.marc_med_morning_puffer'),
            states('binary_sensor.marc_med_lunch'),
            states('binary_sensor.marc_med_evening'),
            states('binary_sensor.marc_med_evening_puffer')
          ] | select('eq', 'on') | list | count %}
          {% set percent = (taken / 5 * 100) | round(0) %}
          
          <div style="text-align: center; padding: 20px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 15px; color: white;">
            <h2 style="margin: 0;">{{ percent }}% Complete</h2>
            <p style="margin: 5px 0; font-size: 18px;">{{ taken }} of 5 doses taken today</p>
            {% if percent == 100 %}
            <p style="margin: 10px 0; font-size: 24px;">🎉 Perfect adherence!</p>
            {% elif percent >= 60 %}
            <p style="margin: 10px 0; font-size: 20px;">👍 Keep it up!</p>
            {% elif percent > 0 %}
            <p style="margin: 10px 0; font-size: 20px;">⏰ {{ 5 - taken }} more to go</p>
            {% else %}
            <p style="margin: 10px 0; font-size: 20px;">💊 Start your day right</p>
            {% endif %}
          </div>

  # ==========================================
  # MEDICATION INVENTORY CARDS
  # ==========================================
  
  - type: markdown
    content: |
      ## 📦 Medication Inventory
      *Current stock levels and refill status*
  
  # Aspirin Card
  - type: custom:mushroom-template-card
    primary: Aspirin 100mg
    secondary: |
      {{ states('sensor.marc_med_aspirin') }} pills • {{ state_attr('sensor.marc_med_aspirin', 'days_remaining') }} days left
    icon: mdi:pill
    icon_color: |
      {% set days = state_attr('sensor.marc_med_aspirin', 'days_remaining') | int %}
      {% if days <= 3 %}
        red
      {% elif days <= 7 %}
        orange
      {% else %}
        green
      {% endif %}
    badge_icon: |
      {% set status = state_attr('sensor.marc_med_aspirin', 'status') %}
      {% if status == 'CRITICAL' %}
        mdi:alert
      {% elif status == 'LOW' %}
        mdi:alert-circle
      {% elif status == 'OUT_OF_STOCK' %}
        mdi:close-circle
      {% else %}
        mdi:check-circle
      {% endif %}
    badge_color: |
      {% set status = state_attr('sensor.marc_med_aspirin', 'status') %}
      {% if status == 'CRITICAL' or status == 'OUT_OF_STOCK' %}
        red
      {% elif status == 'LOW' %}
        orange
      {% else %}
        green
      {% endif %}
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          border-radius: 15px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
  
  # Vitamin D Card
  - type: custom:mushroom-template-card
    primary: Vitamin D 2000 IU
    secondary: |
      {{ states('sensor.marc_med_vitamin_d') }} pills • {{ state_attr('sensor.marc_med_vitamin_d', 'days_remaining') }} days left
    icon: mdi:pill
    icon_color: |
      {% set days = state_attr('sensor.marc_med_vitamin_d', 'days_remaining') | int %}
      {% if days <= 3 %}
        red
      {% elif days <= 7 %}
        orange
      {% else %}
        green
      {% endif %}
    badge_icon: |
      {% set status = state_attr('sensor.marc_med_vitamin_d', 'status') %}
      {% if status == 'CRITICAL' %}
        mdi:alert
      {% elif status == 'LOW' %}
        mdi:alert-circle
      {% else %}
        mdi:check-circle
      {% endif %}
    badge_color: |
      {% set status = state_attr('sensor.marc_med_vitamin_d', 'status') %}
      {% if status in ['CRITICAL', 'OUT_OF_STOCK'] %}
        red
      {% elif status == 'LOW' %}
        orange
      {% else %}
        green
      {% endif %}
    tap_action:
      action: more-info
  
  # Blood Pressure Card
  - type: custom:mushroom-template-card
    primary: Blood Pressure Med 10mg
    secondary: |
      {{ states('sensor.marc_med_blood_pressure_medication') }} pills • {{ state_attr('sensor.marc_med_blood_pressure_medication', 'days_remaining') }} days left
    icon: mdi:pill
    icon_color: |
      {% set days = state_attr('sensor.marc_med_blood_pressure_medication', 'days_remaining') | int %}
      {% if days <= 3 %}
        red
      {% elif days <= 7 %}
        orange
      {% else %}
        green
      {% endif %}
    badge_icon: |
      {% set status = state_attr('sensor.marc_med_blood_pressure_medication', 'status') %}
      {% if status == 'CRITICAL' %}
        mdi:alert
      {% elif status == 'LOW' %}
        mdi:alert-circle
      {% else %}
        mdi:check-circle
      {% endif %}
    badge_color: |
      {% set status = state_attr('sensor.marc_med_blood_pressure_medication', 'status') %}
      {% if status in ['CRITICAL', 'OUT_OF_STOCK'] %}
        red
      {% elif status == 'LOW' %}
        orange
      {% else %}
        green
      {% endif %}
    tap_action:
      action: more-info

  # ==========================================
  # ACTIVE ALERTS
  # ==========================================
  
  - type: markdown
    content: |
      ## ⚠️ Active Alerts
      
      {% set ns = namespace(has_alerts=false) %}
      {% for entity in states.sensor if 'marc_med_' in entity.entity_id %}
        {% set status = state_attr(entity.entity_id, 'status') %}
        {% if status in ['CRITICAL', 'LOW', 'OUT_OF_STOCK', 'NO_REFILLS_LEFT'] %}
          {% set ns.has_alerts = true %}
          {% if status == 'OUT_OF_STOCK' %}
      <ha-alert alert-type="error">
        <strong>{{ state_attr(entity.entity_id, 'medication_name') }}</strong> - OUT OF STOCK<br>
        Contact {{ state_attr(entity.entity_id, 'prescribing_doctor') }} immediately
      </ha-alert>
          {% elif status == 'CRITICAL' %}
      <ha-alert alert-type="warning">
        <strong>{{ state_attr(entity.entity_id, 'medication_name') }}</strong> - CRITICAL<br>
        Only {{ state_attr(entity.entity_id, 'days_remaining') }} days remaining ({{ states(entity.entity_id) }} pills)
      </ha-alert>
          {% elif status == 'LOW' %}
      <ha-alert alert-type="info">
        <strong>{{ state_attr(entity.entity_id, 'medication_name') }}</strong> - Running Low<br>
        {{ state_attr(entity.entity_id, 'days_remaining') }} days remaining • Request refill soon
      </ha-alert>
          {% endif %}
        {% endif %}
      {% endfor %}
      
      {% if not ns.has_alerts %}
      <ha-alert alert-type="success">
        <strong>All Medications OK</strong><br>
        No immediate action required
      </ha-alert>
      {% endif %}
    card_mod:
      style: |
        ha-card {
          border-radius: 15px;
        }

  # ==========================================
  # QUICK STATS
  # ==========================================
  
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.marc_med_aspirin
        name: Total Medications
        icon: mdi:pill-multiple
        primary_info: name
        secondary_info: none
        icon_color: purple
        card_mod:
          style: |
            ha-card {
              --ha-card-background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              border-radius: 15px;
            }
      
      - type: custom:mushroom-template-card
        primary: Refills Needed
        secondary: |
          {% set count = namespace(value=0) %}
          {% for entity in states.sensor if 'marc_med_' in entity.entity_id %}
            {% if state_attr(entity.entity_id, 'days_remaining') | int <= 14 %}
              {% set count.value = count.value + 1 %}
            {% endif %}
          {% endfor %}
          {{ count.value }} medications
        icon: mdi:package-variant
        icon_color: orange
        card_mod:
          style: |
            ha-card {
              border-radius: 15px;
            }

  # ==========================================
  # WEEKLY ADHERENCE CHART
  # ==========================================
  
  - type: markdown
    content: |
      ## 📊 7-Day Adherence History
  
  - type: history-graph
    title: Medication Compliance
    hours_to_show: 168
    entities:
      - entity: binary_sensor.marc_med_morning
        name: Morning
      - entity: binary_sensor.marc_med_lunch
        name: Lunch
      - entity: binary_sensor.marc_med_evening
        name: Evening
    card_mod:
      style: |
        ha-card {
          border-radius: 15px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

  # ==========================================
  # REFILL CALENDAR
  # ==========================================
  
  - type: markdown
    content: |
      ## 📅 Upcoming Refills (Next 30 Days)
      
      {% for entity in states.sensor if 'marc_med_' in entity.entity_id %}
      {% set days = state_attr(entity.entity_id, 'days_remaining') | int %}
      {% if days > 0 and days <= 30 %}
      {% set refill_date = (now().timestamp() + (days * 86400)) | timestamp_custom('%B %d, %Y') %}
      {% set dow = (now().timestamp() + (days * 86400)) | timestamp_custom('%A') %}
      
      <div style="padding: 15px; margin: 10px 0; background: {% if days <= 7 %}#fff3cd{% elif days <= 14 %}#d1ecf1{% else %}#d4edda{% endif %}; border-left: 5px solid {% if days <= 7 %}#ffc107{% elif days <= 14 %}#17a2b8{% else %}#28a745{% endif %}; border-radius: 8px;">
        <strong style="font-size: 18px;">{{ state_attr(entity.entity_id, 'medication_name') }}</strong><br>
        📅 <strong>{{ dow }}, {{ refill_date }}</strong> ({{ days }} days)<br>
        💊 {{ states(entity.entity_id) }} pills remaining<br>
        🔄 {{ state_attr(entity.entity_id, 'refills_left') }} refills available<br>
        👨‍⚕️ {{ state_attr(entity.entity_id, 'prescribing_doctor') }}
      </div>
      {% endif %}
      {% endfor %}
    card_mod:
      style: |
        ha-card {
          border-radius: 15px;
        }

  # ==========================================
  # PRESCRIBING DOCTORS
  # ==========================================
  
  - type: markdown
    content: |
      ## 👨‍⚕️ Prescribing Physicians
      
      {% set doctors = namespace(list=[]) %}
      {% for entity in states.sensor if 'marc_med_' in entity.entity_id %}
        {% set doctor = state_attr(entity.entity_id, 'prescribing_doctor') %}
        {% if doctor not in doctors.list %}
          {% set doctors.list = doctors.list + [doctor] %}
      
      <div style="padding: 15px; margin: 10px 0; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 12px; border-left: 5px solid #2196F3;">
        <h3 style="margin: 0 0 10px 0; color: #1976D2;">{{ doctor }}</h3>
        
        <strong>Medications Prescribed:</strong>
        <ul style="margin: 10px 0;">
      {% for med in states.sensor if 'marc_med_' in med.entity_id and state_attr(med.entity_id, 'prescribing_doctor') == doctor %}
          <li style="margin: 5px 0;">
            <strong>{{ state_attr(med.entity_id, 'medication_name') }}</strong> {{ state_attr(med.entity_id, 'strength') }}<br>
            <small>{{ states(med.entity_id) }} pills • {{ state_attr(med.entity_id, 'days_remaining') }} days • Status: {{ state_attr(med.entity_id, 'status') }}</small>
          </li>
      {% endfor %}
        </ul>
      </div>
        {% endif %}
      {% endfor %}
    card_mod:
      style: |
        ha-card {
          border-radius: 15px;
        }

  # ==========================================
  # QUICK ACTIONS
  # ==========================================
  
  - type: markdown
    content: |
      ## ⚡ Quick Actions
  
  - type: horizontal-stack
    cards:
      - type: button
        name: Take Morning Meds
        icon: mdi:weather-sunset-up
        tap_action:
          action: call-service
          service: marc_med_tracker.check_off_dose
          service_data:
            dose_id: morning
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #FF6B6B 0%, #C44569 100%);
              color: white;
              border-radius: 15px;
            }
      
      - type: button
        name: Take Evening Meds
        icon: mdi:weather-sunset-down
        tap_action:
          action: call-service
          service: marc_med_tracker.check_off_dose
          service_data:
            dose_id: evening
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
              color: white;
              border-radius: 15px;
            }
      
      - type: button
        name: View History
        icon: mdi:history
        tap_action:
          action: navigate
          navigation_path: /history
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              border-radius: 15px;
            }
