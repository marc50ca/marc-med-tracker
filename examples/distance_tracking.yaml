# Walking / Running Distance Tracking
# Quarterly totals + yearly total for hae.marchealthsync_walking_running_distance
# Only counts days where distance > 1.6 km (approx. 1 mile)
#
# SETUP:
# 1. Add input_number helpers to configuration.yaml
# 2. Add both automations to automations.yaml
# 3. Add the dashboard cards via the manual card editor
# 4. Reload All YAML (Developer Tools → YAML)
# 5. To seed current quarter data, set input_number values manually via the dashboard

# ========================================
# HELPERS — add to input_number: in configuration.yaml
# ========================================

input_number:
  distance_q1_total:
    name: "Distance Q1 Total"
    min: 0
    max: 5000
    step: 0.01
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance
    mode: box

  distance_q2_total:
    name: "Distance Q2 Total"
    min: 0
    max: 5000
    step: 0.01
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance
    mode: box

  distance_q3_total:
    name: "Distance Q3 Total"
    min: 0
    max: 5000
    step: 0.01
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance
    mode: box

  distance_q4_total:
    name: "Distance Q4 Total"
    min: 0
    max: 5000
    step: 0.01
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance
    mode: box

  distance_yearly_total:
    name: "Distance Yearly Total"
    min: 0
    max: 20000
    step: 0.01
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance
    mode: box


# ========================================
# AUTOMATIONS — add to automations.yaml
# ========================================

- id: distance_daily_accumulate
  alias: "Distance - Daily Accumulation"
  description: >
    At 23:55 each day, reads today's walking/running distance.
    If > 1.6 km, adds it to the current quarter's total and the yearly total.
    The 1.6 km threshold filters out incidental movement (errands, parking lots, etc.)
    and counts only meaningful walks or runs.
  trigger:
    - platform: time
      at: "23:55:00"
  condition:
    - condition: numeric_state
      entity_id: hae.marchealthsync_walking_running_distance
      above: 1.6
  action:
    - variables:
        today_km: "{{ states('hae.marchealthsync_walking_running_distance') | float(0) | round(2) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ now().month in [1,2,3] }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q1_total
              data:
                value: "{{ (states('input_number.distance_q1_total') | float(0) + today_km) | round(2) }}"
        - conditions:
            - condition: template
              value_template: "{{ now().month in [4,5,6] }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q2_total
              data:
                value: "{{ (states('input_number.distance_q2_total') | float(0) + today_km) | round(2) }}"
        - conditions:
            - condition: template
              value_template: "{{ now().month in [7,8,9] }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q3_total
              data:
                value: "{{ (states('input_number.distance_q3_total') | float(0) + today_km) | round(2) }}"
        - conditions:
            - condition: template
              value_template: "{{ now().month in [10,11,12] }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q4_total
              data:
                value: "{{ (states('input_number.distance_q4_total') | float(0) + today_km) | round(2) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.distance_yearly_total
      data:
        value: "{{ (states('input_number.distance_yearly_total') | float(0) + today_km) | round(2) }}"
  mode: single

- id: distance_quarterly_reset
  alias: "Distance - Quarterly Reset"
  description: >
    At 00:01 on the first day of each new quarter, resets that quarter's counter.
    On Jan 1 also resets the yearly total and Q1 (ready for new year accumulation).
    Q1–Q4 from the previous year remain visible until their respective quarters begin.
  trigger:
    - platform: time
      at: "00:01:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 and now().month in [1,4,7,10] }}"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ now().month == 1 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q1_total
              data:
                value: 0
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_yearly_total
              data:
                value: 0
        - conditions:
            - condition: template
              value_template: "{{ now().month == 4 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q2_total
              data:
                value: 0
        - conditions:
            - condition: template
              value_template: "{{ now().month == 7 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q3_total
              data:
                value: 0
        - conditions:
            - condition: template
              value_template: "{{ now().month == 10 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.distance_q4_total
              data:
                value: 0
  mode: single


# ========================================
# DASHBOARD CARDS — paste individually via manual card editor
# ========================================

# Card 1: Today's live tile
type: tile
entity: hae.marchealthsync_walking_running_distance
name: "Today's Distance"
icon: mdi:map-marker-distance

---

# Card 2: Quarterly / yearly summary — coloured boxes, active quarter highlighted
# Active quarter: bright gradient. Inactive: muted dark box.
# Q1=blue  Q2=green  Q3=pink  Q4=orange-yellow  Year=purple
type: markdown
content: >
  {% set q1 = states('input_number.distance_q1_total') | float(0) | round(1) %}
  {% set q2 = states('input_number.distance_q2_total') | float(0) | round(1) %}
  {% set q3 = states('input_number.distance_q3_total') | float(0) | round(1) %}
  {% set q4 = states('input_number.distance_q4_total') | float(0) | round(1) %}
  {% set yearly = states('input_number.distance_yearly_total') | float(0) | round(1) %}
  {% set m = now().month %}
  {% set cq = 'Q1' if m <= 3 else ('Q2' if m <= 6 else ('Q3' if m <= 9 else 'Q4')) %}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <div style="padding:16px;background:{% if cq=='Q1' %}linear-gradient(135deg,#4facfe,#00f2fe){% else %}rgba(100,100,130,0.3){% endif %};border-radius:10px;text-align:center;color:white;">
      <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">{% if cq=='Q1' %}▶ {% endif %}Q1 &nbsp;·&nbsp; Jan–Mar</div>
      <div style="font-size:28px;font-weight:bold;">{{ q1 }}</div>
      <div style="font-size:11px;opacity:0.7;">km</div>
    </div>
    <div style="padding:16px;background:{% if cq=='Q2' %}linear-gradient(135deg,#43e97b,#38f9d7){% else %}rgba(100,100,130,0.3){% endif %};border-radius:10px;text-align:center;color:white;">
      <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">{% if cq=='Q2' %}▶ {% endif %}Q2 &nbsp;·&nbsp; Apr–Jun</div>
      <div style="font-size:28px;font-weight:bold;">{{ q2 }}</div>
      <div style="font-size:11px;opacity:0.7;">km</div>
    </div>
    <div style="padding:16px;background:{% if cq=='Q3' %}linear-gradient(135deg,#f093fb,#f5576c){% else %}rgba(100,100,130,0.3){% endif %};border-radius:10px;text-align:center;color:white;">
      <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">{% if cq=='Q3' %}▶ {% endif %}Q3 &nbsp;·&nbsp; Jul–Sep</div>
      <div style="font-size:28px;font-weight:bold;">{{ q3 }}</div>
      <div style="font-size:11px;opacity:0.7;">km</div>
    </div>
    <div style="padding:16px;background:{% if cq=='Q4' %}linear-gradient(135deg,#fa709a,#fee140){% else %}rgba(100,100,130,0.3){% endif %};border-radius:10px;text-align:center;color:white;">
      <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">{% if cq=='Q4' %}▶ {% endif %}Q4 &nbsp;·&nbsp; Oct–Dec</div>
      <div style="font-size:28px;font-weight:bold;">{{ q4 }}</div>
      <div style="font-size:11px;opacity:0.7;">km</div>
    </div>
  </div>

  <div style="padding:14px;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;text-align:center;color:white;margin-bottom:6px;">
    <div style="font-size:12px;opacity:0.8;">{{ now().year }} Year Total</div>
    <div style="font-size:30px;font-weight:bold;margin:4px 0;">{{ yearly }} km</div>
  </div>

  <div style="font-size:10px;opacity:0.4;text-align:center;">only days &gt; 1.6 km &nbsp;·&nbsp; captured nightly 23:55</div>

---

# Card 3: 30-day history graph
type: history-graph
title: "Distance History (30 Days)"
hours_to_show: 720
entities:
  - entity: hae.marchealthsync_walking_running_distance
    name: Distance


# ========================================
# NOTES
# ========================================
#
# Threshold: 1.6 km (~1 mile) filters incidental movement.
#   Change the `above: 1.6` in the automation condition to adjust.
#
# Backfilling: The automation only captures from the date it's installed.
#   To seed historical data for the current quarter, set the input_number
#   values manually via Developer Tools → States or the dashboard.
#
# Reset schedule:
#   Jan 1  00:01 → Q1 reset, yearly reset
#   Apr 1  00:01 → Q2 reset
#   Jul 1  00:01 → Q3 reset
#   Oct 1  00:01 → Q4 reset
#
# Sensor unit: assumes hae.marchealthsync_walking_running_distance reports in km.
#   If your sensor reports in metres, change `above: 1.6` to `above: 1600`
#   and divide today_km by 1000 before adding to totals.
