        icon: mdi:pill-multiple
      - type: attribute
        entity: sensor.marc_med_metformin
        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
        icon: mdi:calendar-clock
      - type: attribute
        entity: sensor.marc_med_metformin
        attribute: status
        name: "Status"
        icon: mdi:information
      - type: attribute
        entity: sensor.marc_med_metformin
        attribute: refills_left
        name: "Refills Left"
        icon: mdi:package-variant
      - type: attribute
        entity: sensor.marc_med_metformin
        attribute: notes
        name: "Instructions"
        icon: mdi:note-text
      
      - type: divider
      
      - type: section
        label: "Jardiance 40mg (Diabetes)"
      - entity: sensor.marc_med_jardiance
        name: "Pills Remaining"
        icon: mdi:pill-multiple
      - type: attribute
        entity: sensor.marc_med_jardiance
        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
      - type: attribute
        entity: sensor.marc_med_jardiance
        attribute: status
        name: "Status"
      - type: attribute
