        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
      - type: attribute
        entity: sensor.marc_med_candesartan
        attribute: status
        name: "Status"
      - type: attribute
        entity: sensor.marc_med_candesartan
        attribute: refills_left
        name: "Refills Left"
      
      - type: divider
      
      - type: section
        label: "Rosuvastatin 10mg (Cholesterol)"
      - entity: sensor.marc_med_rosuvastatin
        name: "Pills Remaining"
        icon: mdi:pill-multiple
      - type: attribute
        entity: sensor.marc_med_rosuvastatin
        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
      - type: attribute
        entity: sensor.marc_med_rosuvastatin
        attribute: status
        name: "Status"
      - type: attribute
        entity: sensor.marc_med_rosuvastatin
