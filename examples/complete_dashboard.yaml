  # DR. K. DUCET MEDICATIONS
  - type: entities
    title: "❤️ Dr. K. Ducet - Medications"
    state_color: true
    show_header_toggle: false
    entities:
      - type: section
        label: "Bisoprolol 2.5mg (Heart)"
      - entity: sensor.marc_med_bisoprolol
        name: "Pills Remaining"
        icon: mdi:pill-multiple
      - type: attribute
        entity: sensor.marc_med_bisoprolol
        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
      - type: attribute
        entity: sensor.marc_med_bisoprolol
        attribute: status
        name: "Status"
      - type: attribute
        entity: sensor.marc_med_bisoprolol
        attribute: refills_left
        name: "Refills Left"
      
      - type: divider
      
      - type: section
        label: "Spironolactone 60mg (Heart - Half Tablet)"
      - entity: sensor.marc_med_spironolactone
        name: "Pills Remaining"
        icon: mdi:pill-multiple
      - type: attribute
        entity: sensor.marc_med_spironolactone
        attribute: days_remaining
        name: "Days Remaining"
        suffix: " days"
      - type: attribute
