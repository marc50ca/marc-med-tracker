# ==========================================
# SNOOZE AUTOMATIONS (15 MINUTE DELAY)
# ==========================================

- alias: "Medication Snooze - Morning 15 min"
  description: "Snooze morning medication reminder for 15 minutes"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "SNOOZE_MORNING"
  action:
    - delay: "00:15:00"
    - condition: state
      entity_id: binary_sensor.marc_med_morning
      state: "off"
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "💊 Morning Medications - Reminder"
        message: "Don't forget your 6 morning pills!"
        data:
          push:
            sound:
              name: default

