# ==========================================
# LOW STOCK ALERTS
# ==========================================

- alias: "Medication Alert - Low Stock Warning"
  description: "Alert when any medication reaches 7 days or less"
  trigger:
    - platform: state
      entity_id:
        - sensor.marc_med_metformin
        - sensor.marc_med_jardiance
        - sensor.marc_med_candesartan
        - sensor.marc_med_rosuvastatin
        - sensor.marc_med_pantoprazole
        - sensor.marc_med_bisoprolol
        - sensor.marc_med_spironolactone
        - sensor.marc_med_zenhale_inhaler
      attribute: status
      to: "LOW"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "🟡 Medication Running Low"
        message: >
          {{ trigger.to_state.attributes.medication_name }} is running low.
          {{ trigger.to_state.attributes.days_remaining }} days remaining.
          Request refill from {{ trigger.to_state.attributes.prescribing_doctor }}
        data:
          push:
            sound:
              name: default

- alias: "Medication Alert - Critical Stock Warning"
  description: "Alert when any medication reaches 3 days or less"
  trigger:
    - platform: state
      entity_id:
        - sensor.marc_med_metformin
        - sensor.marc_med_jardiance
        - sensor.marc_med_candesartan
        - sensor.marc_med_rosuvastatin
        - sensor.marc_med_pantoprazole
        - sensor.marc_med_bisoprolol
        - sensor.marc_med_spironolactone
        - sensor.marc_med_zenhale_inhaler
      attribute: status
      to: "CRITICAL"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "🟠 URGENT: Medication Almost Out"
        message: >
          {{ trigger.to_state.attributes.medication_name }} - ONLY {{ trigger.to_state.attributes.days_remaining }} DAYS LEFT!
          Call {{ trigger.to_state.attributes.prescribing_doctor }} NOW to request refill.
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0

- alias: "Medication Alert - Out of Stock"
  description: "Alert when any medication runs out"
  trigger:
    - platform: state
      entity_id:
        - sensor.marc_med_metformin
        - sensor.marc_med_jardiance
        - sensor.marc_med_candesartan
        - sensor.marc_med_rosuvastatin
        - sensor.marc_med_pantoprazole
        - sensor.marc_med_bisoprolol
        - sensor.marc_med_spironolactone
        - sensor.marc_med_zenhale_inhaler
      attribute: status
      to: "OUT_OF_STOCK"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "🔴 CRITICAL: Medication OUT OF STOCK"
        message: >
          {{ trigger.to_state.attributes.medication_name }} is OUT OF STOCK!
          Contact {{ trigger.to_state.attributes.prescribing_doctor }} IMMEDIATELY!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
    - repeat:
        count: 3
        sequence:
          - delay: "00:01:00"
          - service: notify.mobile_app_marcs_iphone_14
            data:
              title: "🔴 URGENT REMINDER"
              message: "{{ trigger.to_state.attributes.medication_name }} still out of stock!"

# ==========================================
# DAILY SUMMARY
# ==========================================

- alias: "Medication Summary - Bedtime Report"
  description: "Send daily medication adherence summary at 10 PM"
  trigger:
    - platform: time
      at: "22:00:00"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "📊 Today's Medication Summary"
        message: >
          Morning Pills: {{ 'Taken ✅' if is_state('binary_sensor.marc_med_morning', 'on') else 'Missed ❌' }}
          Morning Puffer: {{ 'Taken ✅' if is_state('binary_sensor.marc_med_morning_puffer', 'on') else 'Missed ❌' }}
          Lunch Pills: {{ 'Taken ✅' if is_state('binary_sensor.marc_med_lunch', 'on') else 'Missed ❌' }}
          Evening Pills: {{ 'Taken ✅' if is_state('binary_sensor.marc_med_evening', 'on') else 'Missed ❌' }}
          Evening Puffer: {{ 'Taken ✅' if is_state('binary_sensor.marc_med_evening_puffer', 'on') else 'Missed ❌' }}

# ==========================================
# PERFECT DAY CELEBRATION
# ==========================================

- alias: "Medication Celebration - Perfect Adherence"
  description: "Celebrate when all medications taken for the day"
  trigger:
    - platform: state
      entity_id: 
        - binary_sensor.marc_med_morning
        - binary_sensor.marc_med_morning_puffer
        - binary_sensor.marc_med_lunch
        - binary_sensor.marc_med_evening
        - binary_sensor.marc_med_evening_puffer
  condition:
    - condition: state
      entity_id: binary_sensor.marc_med_morning
      state: "on"
    - condition: state
      entity_id: binary_sensor.marc_med_morning_puffer
      state: "on"
    - condition: state
      entity_id: binary_sensor.marc_med_lunch
      state: "on"
    - condition: state
      entity_id: binary_sensor.marc_med_evening
      state: "on"
    - condition: state
      entity_id: binary_sensor.marc_med_evening_puffer
      state: "on"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "🎉 Perfect Medication Day!"
        message: "All medications taken today! Great job staying healthy! 💪"
        data:
          push:
            sound:
              name: default

# ==========================================
# WEEKLY REFILL CHECK
# ==========================================

- alias: "Medication Check - Weekly Refill Status"
  description: "Weekly summary of medications needing refills (every Sunday at 6 PM)"
  trigger:
    - platform: time
      at: "18:00:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "📅 Weekly Medication Check"
        message: >
          Check your medication dashboard for upcoming refills.
          Make sure to request refills for any medications showing yellow or orange status.
