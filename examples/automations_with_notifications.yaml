# Marc Med Tracker - Medication Reminder Automations
# Notifications sent to Marc's iPhone 14 at specific times if doses not taken

# ==========================================
# MORNING MEDICATION REMINDER - 9:30 AM
# ==========================================

- alias: "Medication Reminder - Morning Pills 9:30 AM"
  description: "Remind to take morning medications at 9:30 AM if not marked as taken"
  trigger:
    - platform: time
      at: "09:30:00"
  condition:
    - condition: state
      entity_id: binary_sensor.marc_med_morning
      state: "off"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "💊 Morning Medications"
        message: "Time to take your 6 morning pills!"
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          actions:
            - action: "MARK_MORNING_TAKEN"
              title: "Mark as Taken"
              destructive: false
            - action: "SNOOZE_MORNING"
              title: "Snooze 15 min"
              destructive: false

- alias: "Medication Reminder - Morning Puffer 9:30 AM"
  description: "Remind to take morning Zenhale puffer at 9:30 AM"
  trigger:
    - platform: time
      at: "09:30:00"
  condition:
    - condition: state
      entity_id: binary_sensor.marc_med_morning_puffer
      state: "off"
  action:
    - service: notify.mobile_app_marcs_iphone_14
      data:
        title: "💨 Morning Puffer"
        message: "Take Zenhale inhaler (1-2 puffs) - Rinse mouth after!"
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
          actions:
            - action: "MARK_MORNING_PUFFER_TAKEN"
              title: "Mark as Taken"
              destructive: false

